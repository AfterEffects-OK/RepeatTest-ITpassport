<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Busters - Tactical Cockpit</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --danger: #ff4b2b;
            --warning: #ffcc00;
            --success: #00ff87;
            --bg: #020408; 
            --ui-glow: rgba(0, 242, 254, 0.4);
            --danger-glow: rgba(255, 75, 43, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 75, 43, 0.03) 0%, transparent 40%),
                radial-gradient(circle at center, #050a14 0%, #020408 100%);
        }

        canvas {
            display: block;
        }

        #game-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 255, 0, 0.01));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 10;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 6;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-hud {
            padding: 10px 30px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            align-items: stretch;
            background: linear-gradient(to bottom, rgba(0, 10, 20, 0.9) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.3);
        }

        .hud-module {
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 8px;
            border-radius: 2px;
            text-transform: uppercase;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .hud-value {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-top: 2px;
            text-shadow: 0 0 8px currentColor;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hud-value-pilot {
            font-size: 20px;
            color: var(--primary);
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif, 'Courier New';
        }

        .hud-module-large {
            border: 1px solid currentColor;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .hud-value-large {
            font-size: 26px; 
            font-family: 'Orbitron', sans-serif, 'Courier New';
            letter-spacing: 1px;
        }

        .accuracy-mini-graph {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }
        .accuracy-mini-fill {
            height: 100%;
            width: 0%;
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
            transition: width 0.3s ease;
        }

        #score-display { 
            color: var(--primary); 
            text-shadow: 0 0 15px var(--primary);
        }

        #timer-display {
            color: var(--success);
            text-shadow: 0 0 15px var(--success);
        }

        #lock-status {
            font-size: 9px;
            font-weight: bold;
            display: block;
            transition: color 0.2s;
        }

        .locked-on { color: var(--danger) !important; animation: blink 0.3s infinite alternate; }
        .no-lock { color: rgba(255, 255, 255, 0.2); }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        .bottom-hud {
            height: 150px;
            background: linear-gradient(to top, rgba(0, 10, 20, 0.9) 0%, transparent 100%);
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            padding: 10px 30px;
            display: grid;
            grid-template-columns: 1fr 2fr 1.5fr;
            gap: 15px;
            align-items: center;
        }

        .instrument-panel {
            border: 1px solid rgba(0, 242, 254, 0.3);
            background: rgba(0, 10, 20, 0.7);
            height: 100px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bar-container {
            width: 100%;
            height: 8px;
            background: #111;
            margin-top: 5px;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.1s linear;
        }

        #question-text {
            color: #fff;
            font-size: 18px;
            text-align: center;
            text-shadow: 0 0 10px var(--primary);
            margin: 0;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #warning-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 150px rgba(255, 0, 0, 0);
            z-index: 15;
            transition: box-shadow 0.3s;
        }

        .warning-active #warning-vignette {
            box-shadow: inset 0 0 200px rgba(255, 0, 0, 0.6);
            animation: pulse-red 0.5s infinite alternate;
        }

        .radar-container {
            position: relative;
            width: 80px;
            height: 80px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            background: rgba(0, 20, 40, 0.6);
            overflow: hidden;
        }

        .radar-sweep {
            position: absolute;
            top: 50%; left: 50%;
            width: 150%; height: 150%;
            background: conic-gradient(from 0deg, var(--primary) 0deg, transparent 60deg);
            transform: translate(-50%, -50%);
            animation: rotate-sweep 4s linear infinite;
            opacity: 0.3;
        }

        .blip {
            position: absolute;
            width: 4px; height: 4px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px currentColor;
        }

        @keyframes rotate-sweep { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse-red { from { opacity: 0.4; } to { opacity: 1; } }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 3px;
        }

        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        /* 再出撃ボタン専用の赤く光るスタイル */
        #restart-btn {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 0 0 15px var(--danger-glow);
            font-weight: bold;
            text-shadow: 0 0 8px var(--danger);
        }

        #restart-btn:hover {
            background: var(--danger);
            color: #000;
            box-shadow: 0 0 35px var(--danger);
            text-shadow: none;
        }

        .hidden { display: none !important; }
        .label { color: var(--primary); font-size: 9px; margin-bottom: 2px; display: block; opacity: 0.8; }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 254, 0.5);
            padding: 10px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--ui-glow);
        }

        .result-graph-container {
            margin: 15px 0;
            text-align: left;
        }
        .result-bar-bg {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .result-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--success));
            width: 0%;
            transition: width 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
    </style>
</head>
<body id="body-main">

<div id="game-container">
    <div id="warning-vignette"></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="top-hud">
            <div class="hud-module">
                <span class="label">PILOT_ID</span>
                <span id="pilot-name-display" class="hud-value hud-value-pilot">GUEST</span>
            </div>
            
            <div class="hud-module hud-module-large" style="color: var(--success);">
                <span class="label">MISSION_TIME</span>
                <span id="timer-display" class="hud-value hud-value-large">00:00</span>
            </div>

            <div class="hud-module">
                <span class="label">AIM_COORD</span>
                <span id="aim-display" class="hud-value">X:0 Y:0</span>
                <span id="lock-status" class="no-lock">---</span>
            </div>
            
            <div class="hud-module">
                <span class="label">SHOTS</span>
                <span id="shots-count" class="hud-value">000</span>
            </div>
            <div class="hud-module">
                <span class="label">HITS</span>
                <span id="hits-count" class="hud-value">000</span>
            </div>
            <div class="hud-module">
                <span class="label">ACCURACY</span>
                <span id="accuracy-rate" class="hud-value">0%</span>
                <div class="accuracy-mini-graph">
                    <div id="accuracy-mini-fill" class="accuracy-mini-fill"></div>
                </div>
            </div>

            <div class="hud-module hud-module-large" style="color: var(--primary);">
                <span class="label">SYS_SCORE</span>
                <span id="score-display" class="hud-value hud-value-large">000000</span>
            </div>
        </div>
        
        <div class="bottom-hud">
            <div class="instrument-panel">
                <span class="label">CORE_HEALTH</span>
                <div id="lives-display" style="font-size: 18px; color: var(--danger);">❤❤❤</div>
                <div class="bar-container">
                    <div id="health-bar" class="bar-fill" style="width: 100%; background: var(--danger);"></div>
                </div>
            </div>

            <div class="instrument-panel" style="background: rgba(0, 10, 20, 0.85); border: 1px solid var(--primary);">
                <span class="label" style="text-align: center;">CENTRAL_ANALYZER</span>
                <p id="question-text">SYSTEM STANDBY...</p>
            </div>

            <div class="instrument-panel" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between;">
                        <span class="label">DIST_IND</span>
                        <span id="distance-text" style="font-size: 10px; color: var(--success);">SAFE</span>
                    </div>
                    <div class="bar-container"><div id="distance-bar" class="bar-fill"></div></div>
                    <div style="margin-top: 8px;">
                        <span class="label">WPN_HEAT</span>
                        <div class="bar-container" style="height: 4px;"><div id="weapon-heat" class="bar-fill"></div></div>
                    </div>
                </div>

                <div class="radar-container" style="margin-left: 10px;">
                    <div class="radar-sweep"></div>
                    <div id="radar-blips"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title" style="letter-spacing: 5px;">COCKPIT_LINK_START</h1>
        <div id="start-form" style="width: 320px; padding: 25px; border: 1px solid var(--primary); background: rgba(0,20,40,0.85); box-shadow: 0 0 20px var(--ui-glow);">
            <div style="margin-bottom: 20px;">
                <label class="label">PILOT NAME</label>
                <input type="text" id="input-name" class="form-input" placeholder="Enter Callsign" maxlength="12">
            </div>
            <div style="margin-bottom: 25px;">
                <label class="label">COCKPIT ACCESS EMAIL</label>
                <input type="email" id="input-email" class="form-input" placeholder="pilot@mission.com">
                <p style="font-size: 8px; color: rgba(255,255,255,0.4); margin-top: -10px;">*Email will not be displayed on HUD.</p>
            </div>
            <button id="start-btn" class="btn">INITIALIZE SYSTEM</button>
        </div>
        
        <div id="stats-overlay" class="hidden" style="width: 340px; border: 1px solid var(--danger); padding: 25px; background: rgba(20,0,0,0.95); box-shadow: 0 0 40px rgba(255,0,0,0.2);">
             <p style="color: var(--danger); margin-top: 0; font-weight: bold; letter-spacing: 2px; text-align: center;">MISSION TERMINATED</p>
             <div id="final-stats-container" style="font-size: 13px; margin-bottom: 20px; border-top: 1px solid rgba(255,0,0,0.3); padding-top: 15px;">
             </div>
             <button id="restart-btn" class="btn">RE-ENGAGE</button>
        </div>
    </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let emergencyOsc = null;
let sirenInterval = null;

const Sound = {
    playShoot: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    },
    playHit: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    },
    playError: () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    },
    startEmergency: () => {
        if (emergencyOsc) return;
        emergencyOsc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        emergencyOsc.type = 'sine';
        emergencyOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
        emergencyOsc.connect(gain); gain.connect(audioCtx.destination);
        emergencyOsc.start();
        sirenInterval = setInterval(() => {
            if (!emergencyOsc) return;
            emergencyOsc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.4);
            emergencyOsc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.8);
        }, 800);
    },
    stopEmergency: () => {
        if (emergencyOsc) { try { emergencyOsc.stop(); } catch(e){} emergencyOsc = null; }
        if (sirenInterval) { clearInterval(sirenInterval); sirenInterval = null; }
    }
};

const quizBank = [
    { q: "日本の首都は？", a: "TOKYO", d: ["OSAKA", "KYOTO", "YOKOHAMA"] },
    { q: "太陽系最大の惑星は？", a: "JUPITER", d: ["EARTH", "SATURN", "MARS"] },
    { q: "1 + 1 × 2 = ?", a: "3", d: ["4", "2", "1"] },
    { q: "水の化学記号は？", a: "H2O", d: ["CO2", "O2", "HO"] },
    { q: "世界で最も高い山は？", a: "EVEREST", d: ["K2", "FUJI", "ALPS"] }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-display');
const timerEl = document.getElementById('timer-display');
const aimEl = document.getElementById('aim-display');
const shotsEl = document.getElementById('shots-count');
const hitsEl = document.getElementById('hits-count');
const accuracyEl = document.getElementById('accuracy-rate');
const accuracyMiniFill = document.getElementById('accuracy-mini-fill');
const lockStatusEl = document.getElementById('lock-status');
const questionEl = document.getElementById('question-text');
const weaponHeat = document.getElementById('weapon-heat');
const distanceBarFill = document.querySelector('#distance-bar');
const distanceText = document.getElementById('distance-text');
const pilotDisplay = document.getElementById('pilot-name-display');
const overlay = document.getElementById('overlay');
const bodyMain = document.getElementById('body-main');
const radarBlipsEl = document.getElementById('radar-blips');

let width, height;
let player = null, bullets = [], enemies = [];
let score = 0, lives = 3, startTime = 0, gameElapsedTime = 0;
let shotsFired = 0, shotsHit = 0, resolvedQuizzes = 0;
let currentQuiz = null, gameState = 'START';
let lastShotTime = 0;
let pilotEmail = "";
const shotCooldown = 250;
// TODO: 上記の.gsファイルをデプロイして取得したウェブアプリのURLをここに設定してください。
const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwVjD65x3sD8ACec6Z2C2svyN959x-Ck2U2khZDy8oKC1YdppdpbcBVrcn4HSjkbmuD/exec';


let stars = [];
const STAR_COUNT = 150;

function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({ x: Math.random() * width - width / 2, y: Math.random() * height - height / 2, z: Math.random() * 2, size: Math.random() * 2 + 0.5, brightness: Math.random() });
    }
}

function drawSpaceBackground() {
    ctx.save(); ctx.translate(width / 2, height / 2);
    stars.forEach(star => {
        star.z -= 0.002; if (star.z <= 0) star.z = 2;
        const scale = 400 / star.z; const px = star.x * (scale / 400); const py = star.y * (scale / 400);
        const opacity = Math.min(1, (2 - star.z) * star.brightness);
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`; ctx.beginPath(); ctx.arc(px, py, star.size * (1 / star.z), 0, Math.PI * 2); ctx.fill();
    });
    ctx.restore();
}

function formatTime(ms) {
    const m = Math.floor(ms / 60000); const s = Math.floor((ms % 60000) / 1000);
    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

class Player {
    constructor() { this.x = width / 2; this.y = height / 2; this.targetX = this.x; this.targetY = this.y; this.recoil = 0; this.lockedEnemy = null; }
    update() {
        this.x += (this.targetX - this.x) * 0.15; this.y += (this.targetY - this.y) * 0.15; this.recoil *= 0.8;
        this.lockedEnemy = null;
        for (const en of enemies) {
            const p = en.getPos(); const hw = (en.w * p.s) / 2, hh = (en.h * p.s) / 2;
            if (this.x > p.x - hw && this.x < p.x + hw && this.y > p.y - hh && this.y < p.y + hh) { this.lockedEnemy = en; break; }
        }
        if (this.lockedEnemy) { lockStatusEl.innerText = "LOCK ON"; lockStatusEl.className = "locked-on"; }
        else { lockStatusEl.innerText = "---"; lockStatusEl.className = "no-lock"; }
    }
    draw() {
        const size = 40 + this.recoil; const color = this.lockedEnemy ? '#ff4b2b' : '#00f2fe';
        if (this.lockedEnemy) {
            const p = this.lockedEnemy.getPos(); const fw = this.lockedEnemy.w * p.s + 20; const fh = this.lockedEnemy.h * p.s + 20;
            ctx.save(); ctx.translate(p.x, p.y); ctx.strokeStyle = '#ff4b2b'; ctx.lineWidth = 2;
            const cl = 15;
            ctx.beginPath(); ctx.moveTo(-fw/2, -fh/2 + cl); ctx.lineTo(-fw/2, -fh/2); ctx.lineTo(-fw/2 + cl, -fh/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(fw/2 - cl, -fh/2); ctx.lineTo(fw/2, -fh/2); ctx.lineTo(fw/2, -fh/2 + cl); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-fw/2, fh/2 - cl); ctx.lineTo(-fw/2, fh/2); ctx.lineTo(-fw/2 + cl, fh/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(fw/2 - cl, fh/2); ctx.lineTo(fw/2, fh/2); ctx.lineTo(fw/2, fh/2 - cl); ctx.stroke();
            ctx.restore();
        }
        ctx.save(); ctx.translate(this.x, this.y); ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI * 2); if(!this.lockedEnemy) ctx.setLineDash([5, 5]); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-4, 0); ctx.moveTo(15, 0); ctx.lineTo(4, 0);
        ctx.moveTo(0, -15); ctx.lineTo(0, -4); ctx.moveTo(0, 15); ctx.lineTo(0, 4); ctx.stroke();
        ctx.restore();
    }
}

class Bullet {
    constructor(tx, ty) { this.z = 1.0; this.tx = tx; this.ty = ty; }
    update() { this.z -= 0.05; return this.z <= 0; }
    draw() { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.tx, this.ty, Math.max(1, this.z * 15), 0, Math.PI * 2); ctx.fill(); }
}

class Enemy {
    constructor(text, isCorrect, col, row) { this.text = text; this.isCorrect = isCorrect; this.col = col; this.row = row; this.z = 0; this.w = 200; this.h = 60; }
    update() { this.z += 0.0004; return this.z >= 2.0; }
    getPos() { const scale = Math.max(0.1, 0.2 + this.z * 2); return { x: width/2 + (this.col * 300 * this.z), y: height/2 + (this.row * 180 * this.z), s: scale }; }
    draw() {
        const p = this.getPos(); ctx.save(); ctx.translate(p.x, p.y); ctx.scale(p.s, p.s); ctx.globalAlpha = Math.min(1, this.z * 5);
        let color = this.z > 1.2 ? "#ff4b2b" : (this.z > 0.6 ? "#ffcc00" : "#00f2fe");
        ctx.fillStyle = "rgba(0, 15, 30, 0.9)"; ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.fillStyle = "#fff"; ctx.font = "bold 16px monospace"; ctx.textAlign = "center"; ctx.fillText(this.text, 0, 5); ctx.restore();
    }
}

function initGame() {
    player = new Player(); bullets = []; enemies = []; score = 0; lives = 3; shotsFired = 0; shotsHit = 0; resolvedQuizzes = 0;
    startTime = Date.now(); gameState = 'PLAYING';
    overlay.classList.add('hidden'); document.getElementById('stats-overlay').classList.add('hidden'); document.getElementById('start-form').classList.add('hidden');
    accuracyMiniFill.style.width = "0%";
    nextQuestion();
}

function nextQuestion() {
    currentQuiz = quizBank[Math.floor(Math.random() * quizBank.length)]; questionEl.innerText = currentQuiz.q; enemies = [];
    const opts = [currentQuiz.a, ...currentQuiz.d].sort(() => Math.random() - 0.5); const dirs = [{c:-1,r:-1}, {c:1,r:-1}, {c:-1,r:1}, {c:1,r:1}];
    opts.forEach((o, i) => enemies.push(new Enemy(o, o === currentQuiz.a, dirs[i].c, dirs[i].r)));
}

function gameLoop() {
    ctx.clearRect(0, 0, width, height); drawSpaceBackground();
    if (gameState === 'PLAYING') {
        gameElapsedTime = Date.now() - startTime; timerEl.innerText = formatTime(gameElapsedTime);
        player.update(); aimEl.innerText = `X:${Math.floor(player.x)} Y:${Math.floor(player.y)}`;
        shotsEl.innerText = String(shotsFired).padStart(3, '0');
        hitsEl.innerText = String(shotsHit).padStart(3, '0');
        
        const acc = shotsFired > 0 ? Math.round((shotsHit / shotsFired) * 100) : 0;
        accuracyEl.innerText = acc + "%";
        accuracyMiniFill.style.width = acc + "%";
        accuracyMiniFill.style.background = acc > 70 ? 'var(--success)' : (acc > 40 ? 'var(--warning)' : 'var(--danger)');

        let maxZ = 0;
        enemies.forEach((en) => {
            if (en.update()) { if (en.isCorrect) { lives--; Sound.playError(); } nextQuestion(); }
            if (en.z > maxZ) maxZ = en.z; en.draw();
        });

        distanceBarFill.style.width = Math.min(100, (maxZ / 2.0) * 100) + "%";
        if (maxZ > 1.2) { 
            distanceBarFill.style.background = "var(--danger)"; 
            distanceText.innerText = "WARNING"; 
            bodyMain.classList.add('warning-active'); 
            Sound.startEmergency(); 
        } else if (maxZ > 0.6) {
            distanceBarFill.style.background = "var(--warning)";
            distanceText.innerText = "APPROACH"; 
            bodyMain.classList.remove('warning-active');
            Sound.stopEmergency();
        } else { 
            distanceBarFill.style.background = "var(--success)"; 
            distanceText.innerText = "SAFE"; 
            bodyMain.classList.remove('warning-active'); 
            Sound.stopEmergency(); 
        }

        // 弾丸のループを逆順に変更 (削除時のインデックスずれ防止)
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
            const b = bullets[bi];
            if (b.update()) { bullets.splice(bi, 1); continue; } 
            b.draw();
            
            // 敵との当たり判定
            for (let ei = enemies.length - 1; ei >= 0; ei--) {
                const en = enemies[ei];
                const p = en.getPos(); const hw = (en.w * p.s)/2, hh = (en.h * p.s)/2;
                if (b.tx > p.x-hw && b.tx < p.x+hw && b.ty > p.y-hh && b.ty < p.y+hh) {
                    bullets.splice(bi, 1);
                    if (en.isCorrect) { 
                        shotsHit++;
                        let points = 0;
                        if (en.z > 1.2) points = 50;
                        else if (en.z > 0.6) points = 100;
                        else points = 180;
                        
                        score += points; 
                        Sound.playHit(); 
                        nextQuestion(); 
                        break; // 弾が消えたのでこの弾の処理は終了
                    } else { 
                        lives--; 
                        Sound.playError(); 
                        enemies.splice(ei, 1); 
                        break; // 弾が消えたのでこの弾の処理は終了
                    }
                }
            }
        }
        player.draw();
        weaponHeat.style.width = Math.max(0, 100 - (Date.now() - lastShotTime) / 5) + "%";
        if (lives <= 0) { 
            gameState = 'GAMEOVER'; 
            Sound.stopEmergency(); 
            showGameOver();
        }
    }
    scoreEl.innerText = String(score).padStart(6, '0');
    document.getElementById('lives-display').innerText = '❤'.repeat(Math.max(0, lives));
    document.getElementById('health-bar').style.width = (lives / 3) * 100 + "%";

    radarBlipsEl.innerHTML = '';
    enemies.forEach(en => {
        const blip = document.createElement('div'); blip.className = 'blip';
        blip.style.left = (50 + en.col * en.z * 20) + '%'; blip.style.top = (50 + en.row * en.z * 20) + '%';
        blip.style.backgroundColor = en.isCorrect ? 'var(--primary)' : '#fff'; radarBlipsEl.appendChild(blip);
    });
    requestAnimationFrame(gameLoop);
}

/**
 * スコアをGoogle Apps Scriptバックエンドに送信します。
 * @param {object} scoreData - 送信するスコアデータ
 */
async function submitScore(scoreData) {
    if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === '') {
        console.warn('ウェブアプリURLが設定されていません。スコアは送信されません。');
        return;
    }

    try {
        // Google Apps ScriptへのPOSTは 'no-cors' モードで送信するのが簡単です。
        // これにより、クライアント側はレスポンス内容を読み取れませんが、
        // データを一方的に送信するだけなら問題ありません。
        await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(scoreData)
        });
        console.log('スコアがバックエンドに送信されました。');
    } catch (error) {
        console.error('スコアの送信中にエラーが発生しました:', error);
    }
}

function showGameOver() {
    overlay.classList.remove('hidden');
    const statsOverlay = document.getElementById('stats-overlay');
    statsOverlay.classList.remove('hidden');
    const statsContainer = document.getElementById('final-stats-container');
    const acc = shotsFired > 0 ? Math.round((shotsHit / shotsFired) * 100) : 0;
    
    statsContainer.innerHTML = `
        <div style="margin-bottom: 10px;">
            <p style="margin: 5px 0;"><span class="label">PILOT</span> ${pilotDisplay.innerText}</p>
            <p style="margin: 5px 0;"><span class="label">SCORE</span> ${score}</p>
            <p style="margin: 5px 0;"><span class="label">TIME</span> ${timerEl.innerText}</p>
        </div>
        <div class="result-graph-container">
            <span class="label">FINAL ACCURACY: ${acc}%</span>
            <div class="result-bar-bg">
                <div id="result-bar-fill" class="result-bar-fill"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 8px; color: rgba(255,255,255,0.4); margin-top: 4px;">
                <span>0%</span><span>50%</span><span>100%</span>
            </div>
        </div>
    `;

    // バックエンドに送信するスコアデータを作成
    const finalScoreData = {
        name: pilotDisplay.innerText,
        score: score,
        elapsedTime: timerEl.innerText,
        accuracy: acc,
        hits: shotsHit
    };
    submitScore(finalScoreData);

    setTimeout(() => {
        const fill = document.getElementById('result-bar-fill');
        if (fill) fill.style.width = acc + "%";
    }, 100);
}

function shoot() {
    if (gameState !== 'PLAYING' || Date.now() - lastShotTime < shotCooldown) return;
    bullets.push(new Bullet(player.x, player.y)); shotsFired++;
    Sound.playShoot(); player.recoil = 15; lastShotTime = Date.now();
}

function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; initStars(); }
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { if (player) { player.targetX = e.clientX; player.targetY = e.clientY; } });
window.addEventListener('mousedown', e => { if (gameState === 'PLAYING' && !e.target.closest('.btn') && !e.target.closest('input')) shoot(); });
document.getElementById('start-btn').addEventListener('click', () => {
    const nameVal = document.getElementById('input-name').value || 'GUEST';
    pilotEmail = document.getElementById('input-email').value || '';
    pilotDisplay.innerText = nameVal.toUpperCase();
    if (audioCtx.state === 'suspended') audioCtx.resume(); 
    initGame();
});
document.getElementById('restart-btn').addEventListener('click', initGame);
resize(); requestAnimationFrame(gameLoop);
</script>
