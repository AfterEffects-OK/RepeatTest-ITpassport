<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Busters - Tactical Cockpit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="body-main">

<div id="game-container">
    <div id="pause-overlay" class="hidden">
        <h1>PAUSED</h1>
    </div>
    <div id="warning-vignette"></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="top-hud">
            <div class="hud-module">
                <span class="label">PILOT_ID</span>
                <span id="pilot-name-display" class="hud-value hud-value-pilot">GUEST</span>
            </div>
            
            <div class="hud-module hud-module-large" style="color: var(--success);">
                <span class="label">MISSION_TIME</span>
                <span id="timer-display" class="hud-value hud-value-large">00:00</span>
            </div>

            <div class="hud-module">
                <span class="label">AIM_COORD</span>
                <span id="aim-display" class="hud-value">X:0 Y:0</span>
                <span id="lock-status" class="no-lock">---</span>
            </div>
            
            <div class="hud-module">
                <span class="label">SHOTS</span>
                <span id="shots-count" class="hud-value">000</span>
            </div>
            <div class="hud-module">
                <span class="label">HITS</span>
                <span id="hits-count" class="hud-value">000</span>
            </div>
            <div class="hud-module">
                <span class="label">ACCURACY</span>
                <span id="accuracy-rate" class="hud-value">0%</span>
                <div class="accuracy-mini-graph">
                    <div id="accuracy-mini-fill" class="accuracy-mini-fill"></div>
                </div>
            </div>

            <div class="hud-module hud-module-large" style="color: var(--primary);">
                <span class="label">SYS_SCORE</span>
                <span id="score-display" class="hud-value hud-value-large">000000</span>
            </div>
        </div>
        
        <div class="bottom-hud">
            <div class="instrument-panel">
                <span class="label">CORE_HEALTH</span>
                <div id="lives-display" style="font-size: 18px; color: var(--danger);">❤❤❤</div>
                <div class="bar-container">
                    <div id="health-bar" class="bar-fill" style="width: 100%; background: var(--danger);"></div>
                </div>
            </div>

            <div class="instrument-panel" style="background: rgba(0, 10, 20, 0.85); border: 1px solid var(--primary);">
                <span class="label" style="text-align: center;">CENTRAL_ANALYZER</span>
                <p id="question-text">SYSTEM STANDBY...</p>
            </div>

            <div class="instrument-panel" style="flex-direction: row; align-items: center; justify-content: space-between;">
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between;">
                        <span class="label">DIST_IND</span>
                        <span id="distance-text" style="font-size: 10px; color: var(--success);">SAFE</span>
                    </div>
                    <div class="bar-container"><div id="distance-bar" class="bar-fill"></div></div>
                    <div style="margin-top: 8px;">
                        <span class="label">WPN_HEAT</span>
                        <div class="bar-container" style="height: 4px;"><div id="weapon-heat" class="bar-fill"></div></div>
                    </div>
                </div>

                <div class="radar-container" style="margin-left: 10px;">
                    <div class="radar-sweep"></div>
                    <div id="radar-blips"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title" style="letter-spacing: 5px;">COCKPIT_LINK_START</h1>
        <div id="start-form" style="width: 320px; padding: 25px; border: 1px solid var(--primary); background: rgba(0,20,40,0.85); box-shadow: 0 0 20px var(--ui-glow);">
            <div style="margin-bottom: 20px;">
                <label class="label">PILOT NAME</label>
                <input type="text" id="input-name" class="form-input" placeholder="Enter Callsign" maxlength="12">
            </div>
            <div style="margin-bottom: 25px;">
                <label class="label">COCKPIT ACCESS EMAIL</label>
                <input type="email" id="input-email" class="form-input" placeholder="pilot@mission.com">
                <p style="font-size: 8px; color: rgba(255,255,255,0.4); margin-top: -10px;">※メールアドレスは、ランキングの個人識別のみに使用されます。</p>
            </div>
            <div style="margin-bottom: 25px;">
                <label class="label">MISSION CATEGORY</label>
                <select id="category-select" class="form-input" disabled>
                    <option value="all">全カテゴリ</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                <button id="start-btn" class="btn">INITIALIZE SYSTEM</button>
                <button id="ranking-btn" class="btn">RANKING</button>
            </div>
        </div>
        
        <div id="stats-overlay" class="hidden" style="width: 420px; max-width: 90vw; max-height: 80vh; overflow-y: auto; border: 1px solid var(--danger); padding: 25px; background: rgba(20,0,0,0.95); box-shadow: 0 0 40px rgba(255,0,0,0.2);">
             <p style="color: var(--danger); margin-top: 0; font-weight: bold; letter-spacing: 2px; text-align: center;">MISSION TERMINATED</p>
             <div id="final-stats-container" style="font-size: 18px; margin-bottom: 20px; border-top: 1px solid rgba(255,0,0,0.3); padding-top: 15px;">
             </div>
             <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                <button id="restart-btn" class="btn">RE-ENGAGE</button>
                <button id="back-to-start-btn" class="btn">RETURN TO HANGAR</button>
             </div>
        </div>

        <div id="ranking-overlay" class="hidden" style="width: 600px; max-width: 90vw; border: 1px solid var(--secondary); padding: 25px; background: rgba(0,20,40,0.95); box-shadow: 0 0 40px var(--ui-glow);">
            <div class="tab-buttons">
                <button id="leaderboard-tab-btn" class="tab-btn active">LEADERBOARD</button>
                <button id="my-scores-tab-btn" class="tab-btn">MY SCORES</button>
            </div>
            <div id="leaderboard-content" class="tab-content active">
                <div id="ranking-list-container" class="ranking-container"></div>
            </div>
            <div id="my-scores-content" class="tab-content">
                <div id="my-scores-list-container" class="ranking-container"></div>
            </div>
            <button id="back-from-ranking-btn" class="btn" style="margin-top: 20px;">BACK</button>
        </div>
    </div>

    <div id="review-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div style="width: 80%; max-width: 800px; max-height: 90vh; overflow-y: auto; background: rgba(5, 10, 15, 0.95); border: 1px solid var(--primary); padding: 40px; position: relative; box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);">
            <button id="close-modal-btn" class="btn" style="position: absolute; top: 20px; right: 20px; width: auto; padding: 5px 15px; font-size: 14px;">CLOSE</button>
            <h2 style="color: var(--warning); margin-top: 0; border-bottom: 1px solid var(--warning); padding-bottom: 15px; letter-spacing: 2px;">DETAILED ANALYSIS</h2>
            <div id="modal-content" style="margin-top: 25px;">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
